<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Rural - Directorio de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Hanken+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --primary: #4b5320; --surface: #ffffff; }
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: var(--surface); }
        h1, h2, .font-serif { font-family: 'Noto Serif', serif; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 50%; border-radius: 8px;}
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="border-b border-gray-200 px-8 py-4 flex justify-between items-center bg-white shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-2xl font-serif font-bold text-[#4b5320]">TURISMO RURAL</span>
            <div class="flex gap-6 text-sm font-medium uppercase tracking-wider">
                <a href="index.html" class="text-gray-500 hover:text-black transition-colors">Check-in</a>
                <a href="clientes.html" class="text-black border-b-2 border-[#4b5320] pb-1">Gestión Clientes</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-12 max-w-7xl mx-auto w-full">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-5xl font-serif mb-4">Registro Maestro de Clientes</h1>
                <p class="text-gray-600 text-lg">Gestione la base de datos de sus huéspedes con distinción y precisión.</p>
            </div>
            <button onclick="abrirModal()" class="bg-[#4b5320] text-white px-8 py-3 rounded-md font-semibold hover:bg-[#3a4018] transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">add</span> NUEVO CLIENTE
            </button>
        </div>

        <div class="bg-white border border-gray-200 rounded-sm overflow-hidden shadow-sm">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h2 class="text-2xl font-serif">Directorio de Clientes</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500 border-b border-gray-200">
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Identificación</th>
                            <th class="px-6 py-4">Nombre Completo</th>
                            <th class="px-6 py-4">Correo Electrónico</th>
                            <th class="px-6 py-4">Teléfono</th>
                            <th class="px-6 py-4">Estado</th>
                            <th class="px-6 py-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaClientes" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalCliente" class="modal">
      <div class="modal-content shadow-lg">
        <div class="flex justify-between items-center border-b pb-3 mb-4">
            <h2 class="text-2xl font-serif" id="modalTitle">Nuevo Cliente</h2>
            <button onclick="cerrarModal()" class="text-gray-500 hover:text-black font-bold">&times;</button>
        </div>
        <div>
            <input type="hidden" id="formId">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">Identificación</label>
                <input type="text" id="formIdentificacion" class="w-full border border-gray-300 p-2 rounded focus:outline-[#4b5320]">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" id="formNombre" class="w-full border border-gray-300 p-2 rounded focus:outline-[#4b5320]">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                <input type="email" id="formEmail" class="w-full border border-gray-300 p-2 rounded focus:outline-[#4b5320]">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-1">Teléfono</label>
                <input type="text" id="formTelefono" class="w-full border border-gray-300 p-2 rounded focus:outline-[#4b5320]">
            </div>
            <div class="flex justify-end gap-2">
                <button onclick="cerrarModal()" class="px-4 py-2 border border-gray-300 rounded font-bold hover:bg-gray-50">Cancelar</button>
                <button onclick="guardarCliente()" class="px-4 py-2 bg-[#4b5320] text-white rounded font-bold hover:bg-[#3a4018]">Guardar Cliente</button>
            </div>
        </div>
      </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/clientes';
        const modal = document.getElementById('modalCliente');

        document.addEventListener('DOMContentLoaded', cargarClientes);

        async function cargarClientes() {
            try {
                const response = await fetch(API_URL);
                const clientes = await response.json();
                const tbody = document.getElementById('tablaClientes');
                tbody.innerHTML = '';
                
                clientes.forEach(c => {
                    const estadoBadge = c.activo 
                        ? '<span class="bg-green-100 text-green-800 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Activo</span>' 
                        : '<span class="bg-red-100 text-red-800 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Inactivo</span>';

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="px-6 py-4 font-mono text-xs text-gray-400">${c.id}</td>
                            <td class="px-6 py-4 text-sm font-medium">${c.identificacion || '---'}</td>
                            <td class="px-6 py-4 text-sm font-serif">${c.nombre}</td>
                            <td class="px-6 py-4 text-sm text-gray-600">${c.email}</td>
                            <td class="px-6 py-4 text-sm text-gray-600">${c.telefono}</td>
                            <td class="px-6 py-4">${estadoBadge}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick='editarCliente(${JSON.stringify(c)})' class="text-gray-400 hover:text-[#4b5320] mx-2"><span class="material-symbols-outlined text-sm">edit</span></button>
                                <button onclick="eliminarCliente(${c.id})" class="text-gray-400 hover:text-red-600 mx-2"><span class="material-symbols-outlined text-sm">delete</span></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error('Error al cargar clientes:', error); }
        }

        function abrirModal() {
            document.getElementById('formId').value = '';
            document.getElementById('formIdentificacion').value = '';
            document.getElementById('formIdentificacion').disabled = false;
            document.getElementById('formNombre').value = '';
            document.getElementById('formEmail').value = '';
            document.getElementById('formTelefono').value = '';
            document.getElementById('modalTitle').innerText = 'Nuevo Cliente';
            modal.style.display = 'block';
        }

        function cerrarModal() { modal.style.display = 'none'; }

        function editarCliente(c) {
            document.getElementById('formId').value = c.id;
            document.getElementById('formIdentificacion').value = c.identificacion || '';
            document.getElementById('formIdentificacion').disabled = true;
            document.getElementById('formNombre').value = c.nombre;
            document.getElementById('formEmail').value = c.email;
            document.getElementById('formTelefono').value = c.telefono;
            document.getElementById('modalTitle').innerText = 'Editar Cliente';
            modal.style.display = 'block';
        }

        async function guardarCliente() {
            const id = document.getElementById('formId').value;
            
            // SE CORRIGIÓ AQUÍ: Ahora se mapea correctamente la identificación exigida por el Backend
            const payload = {
                identificacion: document.getElementById('formIdentificacion').value,
                nombre: document.getElementById('formNombre').value,
                email: document.getElementById('formEmail').value,
                telefono: document.getElementById('formTelefono').value,
                activo: true
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(response.ok) {
                    cerrarModal();
                    cargarClientes();
                } else {
                    const errText = await response.text();
                    alert("Error al guardar cliente: " + errText);
                }
            } catch (error) { alert("Error de conexión con el servidor."); }
        }

        async function eliminarCliente(id) {
            if(confirm('¿Está seguro de eliminar este cliente?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    cargarClientes();
                } catch (error) { console.error('Error al eliminar:', error); }
            }
        }
    </script>
</body>
</html>
