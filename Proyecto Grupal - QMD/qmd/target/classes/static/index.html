<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Rural - Check-in Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Hanken+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --primary: #4b5320; --surface: #ffffff; }
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: #fcfcfc; }
        h1, h2, .font-serif { font-family: 'Noto Serif', serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="border-b border-gray-200 px-8 py-4 flex justify-between items-center bg-white shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-2xl font-serif font-bold text-[#4b5320]">TURISMO RURAL</span>
            <div class="flex gap-6 text-sm font-medium uppercase tracking-wider">
                <a href="index.html" class="text-black border-b-2 border-[#4b5320] pb-1">Check-in</a>
                <a href="clientes.html" class="text-gray-500 hover:text-black transition-colors">Gestión Clientes</a>
            </div>
        </div>
    </nav>

    <main class="p-12 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div class="lg:col-span-2">
            <h1 class="text-5xl font-serif mb-4">Check-in Express</h1>
            <p class="text-gray-600 mb-12">Gestione la llegada con la distinción que merecen sus huéspedes.</p>
            
            <div id="mensajeAlerta" class="hidden mb-6 p-4 rounded text-sm font-bold"></div>

            <div class="bg-white border border-gray-200 p-8 rounded shadow-sm mb-8">
                <h2 class="text-xl font-serif mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-[#4b5320]">search</span> Localizar Reserva
                </h2>
                <div class="flex gap-4">
                    <input type="number" id="idReserva" placeholder="ID de Reserva (Ej: 1)" class="flex-grow border border-gray-300 p-3 rounded focus:outline-[#4b5320]">
                    <button onclick="buscarReservaReal()" class="bg-[#4b5320] text-white px-8 py-3 rounded font-bold hover:bg-[#3a4018] flex items-center gap-2">
                        <span class="material-symbols-outlined">analytics</span> CONSULTAR
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <div class="bg-[#f5f5f0] p-6 border-l-4 border-[#4b5320]">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">ID Reserva</p>
                    <p class="text-xl font-serif" id="displayId">---</p>
                </div>
                <div class="bg-[#f5f5f0] p-6 border-l-4 border-[#4b5320]">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Estado Actual</p>
                    <p class="text-xl font-serif" id="displayEstado">---</p>
                </div>
            </div>
        </div>

        <aside class="bg-white border border-gray-200 p-8 rounded shadow-lg h-fit sticky top-24">
            <h2 class="text-2xl font-serif mb-8 border-b border-gray-100 pb-4">Liquidación</h2>
            <div class="space-y-6">
                <div class="flex justify-between items-center text-gray-600">
                    <span>Saldo Original</span>
                    <span class="font-bold text-black" id="saldoPendiente">$ 0</span>
                </div>
                
                <div class="pt-4">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Aplicar Cupón</label>
                    <div class="flex gap-2">
                        <input type="text" id="codigoCupon" placeholder="CÓDIGO (Opcional)" class="flex-grow border border-gray-300 p-2 text-sm rounded">
                        <button onclick="aplicarCuponReal()" class="border border-[#4b5320] text-[#4b5320] px-4 rounded text-xs font-bold hover:bg-gray-50 transition-colors">APLICAR</button>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Método de Pago</label>
                    <select id="metodoPago" class="w-full border border-gray-300 p-2 text-sm rounded">
                        <option value="EFECTIVO">Efectivo</option>
                        <option value="TARJETA">Tarjeta</option>
                        <option value="TRANSFERENCIA">Transferencia</option>
                    </select>
                </div>

                <div class="pt-4">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2 text-green-700">Monto Recibido</label>
                    <input type="text" id="montoRecibido" oninput="formatearInputMoneda(this)" placeholder="Ej: 600.000" class="w-full border-2 border-green-500 p-2 text-sm rounded font-bold">
                </div>

                <div class="bg-[#f5f5f0] p-6 rounded text-center mt-4">
                    <p class="text-xs text-gray-500 uppercase font-bold mb-1">Total a Pagar</p>
                    <p class="text-4xl font-serif text-[#4b5320]" id="totalNeto">$ 0</p>
                </div>

                <button onclick="confirmarCheckIn()" class="w-full bg-black text-white py-4 rounded font-bold tracking-widest hover:bg-[#4b5320] transition-all">
                    CONFIRMAR CHECK-IN
                </button>
            </div>
        </aside>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/api/checkin';
        let saldoOriginalGlobal = 0;

        const formatoCOP = (valor) => {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(valor);
        };

        function formatearInputMoneda(input) {
            let valorLimpio = input.value.replace(/\D/g, '');
            if (valorLimpio === '') { input.value = ''; return; }
            input.value = new Intl.NumberFormat('es-CO').format(parseInt(valorLimpio));
        }

        function mostrarAlerta(mensaje, tipoTailwind) {
            const alerta = document.getElementById('mensajeAlerta');
            let colorClase = 'bg-blue-100 text-blue-800';
            if(tipoTailwind === 'success') colorClase = 'bg-green-100 text-green-800';
            if(tipoTailwind === 'danger') colorClase = 'bg-red-100 text-red-800';
            if(tipoTailwind === 'warning') colorClase = 'bg-yellow-100 text-yellow-800';
            
            alerta.className = `mb-6 p-4 rounded text-sm font-bold block ${colorClase}`;
            alerta.innerText = mensaje;
        }

        async function buscarReservaReal() {
            const id = document.getElementById('idReserva').value;
            if (!id) return;
            try {
                const response = await fetch(`${API_URL}/reserva/${id}`);
                if (response.ok) {
                    const reserva = await response.json();
                    saldoOriginalGlobal = reserva.saldoPendiente;

                    document.getElementById('displayId').innerText = reserva.id;
                    document.getElementById('displayEstado').innerText = reserva.estado;
                    document.getElementById('saldoPendiente').innerText = formatoCOP(reserva.saldoPendiente);
                    document.getElementById('totalNeto').innerText = formatoCOP(reserva.saldoPendiente);

                    mostrarAlerta('Reserva encontrada con éxito.', 'success');
                } else {
                    const errorText = await response.text();
                    mostrarAlerta(`${errorText}`, 'danger');
                }
            } catch (error) { mostrarAlerta('Error al conectar con el servidor.', 'danger'); }
        }

        async function aplicarCuponReal() {
            const codigo = document.getElementById('codigoCupon').value;
            if (!codigo || saldoOriginalGlobal === 0) {
                mostrarAlerta('Busque primero una reserva o ingrese un código válido.', 'warning');
                return;
            }
            try {
                const response = await fetch(`${API_URL}/cupon/${codigo}`);
                if (response.ok) {
                    const cupon = await response.json();
                    if (cupon.estado !== 'ACTIVO') {
                        mostrarAlerta('Este cupón ya ha sido utilizado o está inactivo.', 'danger');
                        return;
                    }
                    const porcentaje = cupon.descuentoPorcentaje;
                    const descuento = saldoOriginalGlobal * (porcentaje / 100);
                    const nuevoTotal = saldoOriginalGlobal - descuento;
                    document.getElementById('totalNeto').innerText = formatoCOP(nuevoTotal);
                    mostrarAlerta(`Cupón aplicado con éxito! Descuento del ${porcentaje}%.`, 'success');
                } else {
                    const errorText = await response.text();
                    mostrarAlerta(`${errorText}`, 'danger');
                }
            } catch (error) { mostrarAlerta('Error al validar el cupón.', 'danger'); }
        }

        async function confirmarCheckIn() {
            const totalNetoVisual = document.getElementById('totalNeto').innerText.replace(/\D/g, '');
            const montoRecibidoVisual = document.getElementById('montoRecibido').value.replace(/\D/g, '');

            const totalPagar = parseFloat(totalNetoVisual);
            const recibido = parseFloat(montoRecibidoVisual);

            if (!recibido) {
                mostrarAlerta('Por favor ingrese el monto recibido.', 'warning');
                return;
            }

            const payload = {
                idReserva: parseInt(document.getElementById('idReserva').value),
                codigoCupon: document.getElementById('codigoCupon').value || null,
                metodoPago: document.getElementById('metodoPago').value,
                montoRecibido: recibido 
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    const pago = await response.json();
                    const cambio = recibido - totalPagar;
                    let msjExito = `Check-in exitoso. Pago ID: ${pago.id} registrado correctamente.`;
                    if (cambio > 0) msjExito += ` \nCambio a entregar al huésped: ${formatoCOP(cambio)}`;
                    
                    mostrarAlerta(msjExito, 'success');
                    document.getElementById('displayEstado').innerText = 'CHECK_IN_REALIZADO';
                } else {
                    const errorMsg = await response.text();
                    mostrarAlerta(`Error de Negocio: ${errorMsg}`, 'danger');
                }
            } catch (error) { mostrarAlerta('Error de conexión con el servidor.', 'danger'); }
        }
    </script>
</body>
</html>
